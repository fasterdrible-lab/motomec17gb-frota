version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: motomec_postgres
    environment:
      POSTGRES_DB: motomec
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - motomec_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: motomec_backend
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/motomec}
      - SECRET_KEY=${SECRET_KEY:-change-this-secret-key-in-production}
      - GOOGLE_SHEETS_ID=${GOOGLE_SHEETS_ID:-}
      - GOOGLE_CREDENTIALS_PATH=${GOOGLE_CREDENTIALS_PATH:-config/credentials.json}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - FIPE_API_URL=${FIPE_API_URL:-https://parallelum.com.br/fipe/api/v1}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./backend:/app
      - ./backend/logs:/app/logs
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - motomec_network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: motomec_frontend
    environment:
      - REACT_APP_API_URL=${REACT_APP_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - motomec_network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  motomec_network:
    driver: bridge
