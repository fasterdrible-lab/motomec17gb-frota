name: Run Tests

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

permissions:
  contents: read

jobs:
  backend-tests:
    name: Testes do Backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_DB: motomec17gb_test
          POSTGRES_USER: motomec
          POSTGRES_PASSWORD: motomec_test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Executar testes com pytest
        env:
          DATABASE_URL: postgresql://motomec:motomec_test_password@localhost:5432/motomec17gb_test
          SECRET_KEY: test_secret_key_for_ci
          GOOGLE_SHEETS_ID: ""
          TELEGRAM_BOT_TOKEN: ""
          TELEGRAM_CHAT_ID: ""
          DEBUG: "true"
        run: |
          pytest backend/tests/ -v --tb=short --cov=backend/app --cov-report=term-missing

  frontend-tests:
    name: Testes do Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependências
        working-directory: frontend
        run: npm install

      - name: Executar testes
        working-directory: frontend
        run: npm test -- --passWithNoTests --watchAll=false
