name: Deploy to Railway

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_DB: motomec17gb_test
          POSTGRES_USER: motomec
          POSTGRES_PASSWORD: motomec_test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Instalar dependências do backend
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Executar testes
        env:
          DATABASE_URL: postgresql://motomec:motomec_test_password@localhost:5432/motomec17gb_test
          SECRET_KEY: test_secret_key_for_ci
          GOOGLE_SHEETS_ID: ""
          TELEGRAM_BOT_TOKEN: ""
          TELEGRAM_CHAT_ID: ""
          DEBUG: "true"
        run: |
          pytest backend/tests/ -v --tb=short

  build-and-deploy:
    name: Build e Deploy
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build imagem Docker do backend
        run: |
          docker build -t motomec17gb-backend:${{ github.sha }} ./backend

      - name: Build imagem Docker do frontend
        run: |
          docker build -t motomec17gb-frontend:${{ github.sha }} ./frontend

      - name: Deploy para Railway
        if: ${{ secrets.RAILWAY_TOKEN != '' }}
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          npm install -g @railway/cli
          railway up --service backend --detach
